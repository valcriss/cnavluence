version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: cnavluence-postgres-dev
    environment:
      POSTGRES_DB: cnavluence
      POSTGRES_USER: cnavluence
      POSTGRES_PASSWORD: cnavluence
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnavluence -d cnavluence"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: cnavluence-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cnavluence
      MINIO_ROOT_PASSWORD: cnavluence123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  minio_dev_data:
